<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V's 2026 Goal List ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- 浮動裝飾泡泡 -->
  <div class="bg-deco" aria-hidden="true">
    <span class="deco-blob b1"></span>
    <span class="deco-blob b2"></span>
    <span class="deco-blob b3"></span>
  </div>

  <!-- ====== 設定遮罩：未設定時強制顯示 ====== -->
  <div class="setup-overlay" id="setupOverlay">
    <div class="setup-card">
      <div class="setup-icon">🌸</div>
      <h1 class="setup-title">V's 2026 Goal List</h1>
      <p class="setup-desc">
        在開始之前，請先設定 Google Sheets Web App URL，<br />
        資料才能正確儲存與讀取。
      </p>
      <label class="field-label" for="setupUrl">Apps Script Web App URL</label>
      <input
        type="url"
        id="setupUrl"
        class="field-input"
        placeholder="https://script.google.com/macros/s/…/exec"
        autocomplete="off"
      />
      <div id="setupError" class="setup-error" hidden></div>
      <button class="btn-primary" id="btnSetupSave">連線並開始使用 →</button>
      <a class="setup-help-link" href="README.md" target="_blank">📖 如何取得 URL？看教學</a>
    </div>
  </div>

  <!-- ====== 主應用 ====== -->
  <div class="app" id="app" hidden>

    <!-- 頂部 Header -->
    <header class="site-header">
      <div class="header-top">
        <div class="header-brand">
          <span class="brand-flower">🌸</span>
          <h1 class="brand-title">V's 2026 Goal List</h1>
        </div>
        <div class="header-controls">
          <div class="sync-badge" id="syncBadge" data-state="idle">
            <span class="sync-dot"></span>
            <span class="sync-label" id="syncLabel">已連線</span>
          </div>
          <button class="btn-icon" id="btnOpenConfig" title="重新設定連線">⚙️</button>
        </div>
      </div>

      <!-- 整體統計 -->
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-val" id="statTotal">0</span>
          <span class="stat-key">總目標</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-val" id="statDone">0</span>
          <span class="stat-key">已完成</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-val" id="statRate">0%</span>
          <span class="stat-key">完成率</span>
        </div>
      </div>

      <!-- 今日3件事 -->
      <div class="today-strip" id="todayStrip" hidden>
        <div class="today-heading">
          <span>🎯</span>
          <strong>今日建議</strong>
          <span class="today-sub">隨機推薦，輕鬆看看就好</span>
        </div>
        <div class="today-chips" id="todayChips"></div>
      </div>
    </header>

    <!-- 四大區塊 Grid -->
    <main class="sections-grid" id="sectionsGrid">
      <!-- 動態產生 -->
    </main>

  </div>

  <!-- ====== 重新設定彈窗 ====== -->
  <div class="modal-backdrop" id="configModal" hidden>
    <div class="modal-box">
      <button class="modal-close" id="btnCloseConfig">✕</button>
      <h2 class="modal-title">⚙️ 重新設定連線</h2>
      <label class="field-label" for="configUrl">Apps Script Web App URL</label>
      <input
        type="url"
        id="configUrl"
        class="field-input"
        placeholder="https://script.google.com/macros/s/…/exec"
        autocomplete="off"
      />
      <div id="configError" class="setup-error" hidden></div>
      <div class="modal-actions">
        <button class="btn-ghost" id="btnCancelConfig">取消</button>
        <button class="btn-primary" id="btnSaveConfig">儲存</button>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
